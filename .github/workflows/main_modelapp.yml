# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - modelapp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #Required when OIDC login path is used
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Resolve deployment auth mode
        id: auth
        run: |
          if [ -n "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ] || [ -n "${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}" ]; then
            echo "mode=publish" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${{ secrets.AZUREAPPSERVICE_CLIENTID_37EF5F745EAD460DA9E860B241A1C204 }}" ] && \
             [ -n "${{ secrets.AZUREAPPSERVICE_TENANTID_2F2D821A7B354C8EAAD26935844F005F }}" ] && \
             [ -n "${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5AD36BACCF3A4E83BC00130C9B9AEF81 }}" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No valid deployment auth found. Configure one of:"
          echo "1) Publish profile secret: AZURE_WEBAPP_PUBLISH_PROFILE (or AZUREAPPSERVICE_PUBLISHPROFILE)"
          echo "2) OIDC secrets: AZUREAPPSERVICE_CLIENTID_37EF5F745EAD460DA9E860B241A1C204, AZUREAPPSERVICE_TENANTID_2F2D821A7B354C8EAAD26935844F005F, AZUREAPPSERVICE_SUBSCRIPTIONID_5AD36BACCF3A4E83BC00130C9B9AEF81"
          exit 1

      - name: Login to Azure (OIDC)
        if: steps.auth.outputs.mode == 'oidc'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_37EF5F745EAD460DA9E860B241A1C204 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2F2D821A7B354C8EAAD26935844F005F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5AD36BACCF3A4E83BC00130C9B9AEF81 }}

      - name: Deploy to Azure Web App (publish profile)
        if: steps.auth.outputs.mode == 'publish'
        id: deploy-to-webapp-publish
        uses: azure/webapps-deploy@v3
        with:
          app-name: "modelapp"
          slot-name: "Production"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE || secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: .

      - name: Deploy to Azure Web App (OIDC)
        if: steps.auth.outputs.mode == 'oidc'
        id: deploy-to-webapp-oidc
        uses: azure/webapps-deploy@v3
        with:
          app-name: "modelapp"
          slot-name: "Production"
          package: .
